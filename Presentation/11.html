<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Tracelink</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Space+Grotesk:wght@400;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            font-family: 'Inter', sans-serif;
            overflow: hidden;



        }

        .slide-container {
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at 50% 100%, #1a2c38 0%, #000000 70%);
            position: relative;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Animated Background Elements */
        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: 0;
            opacity: 0.3;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: #00f2ff;
            bottom: -200px;
            left: 20%;
            animation: float 15s infinite alternate;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: #8b5cf6;
            top: -100px;
            right: 15%;
            animation: float 20s infinite alternate-reverse;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0);
            }

            100% {
                transform: translate(50px, 50px);
            }
        }

        .grid-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 1;
        }

        .content-wrapper {
            position: relative;
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .thank-you-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 120px;
            font-weight: 700;
            background: linear-gradient(135deg, #00f2ff 0%, #4ade80 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -4px;
            margin: 0;
            line-height: 1;
            filter: drop-shadow(0 0 30px rgba(0, 242, 255, 0.2));
        }

        .final-tagline {
            font-size: 28px;
            color: #94a3b8;
            font-weight: 300;
            max-width: 800px;
            margin: 0;
        }

        .cta-container {
            display: flex;
            gap: 24px;
            margin-top: 20px;
        }

        .cta-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 30px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .cta-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(0, 242, 255, 0.4);
        }

        .cta-icon {
            font-size: 40px;
            color: #00f2ff;
        }

        .cta-text {
            font-size: 16px;
            font-weight: 600;
            color: #e2e8f0;
        }

        .cta-subtext {
            font-size: 14px;
            color: #64748b;
        }

        .logo-small {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 60px;
            opacity: 0.6;
        }

        .logo-mark-small {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #00f2ff 0%, #4ade80 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-text-small {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 1px;
            color: white;
        }


        .profile-pic {
            width: 400px;
            height: 400px;
            border-radius: 50%;
            border: 4px solid rgba(0, 242, 255, 0.3);
            object-fit: cover;
            margin-bottom: 10px;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.2);
        }

        .profile-name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, #00f2ff 0%, #4ade80 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            line-height: 1.2;
        }

        .profile-title {
            font-size: 22px;
            color: #e2e8f0;
            font-weight: 600;
            margin-top: 0;
        }

        .profile-bio {
            font-size: 18px;
            color: #94a3b8;
            max-width: 600px;
            line-height: 1.6;
            margin-top: 5px;
            font-weight: 300;
        }

        /* Navigation Controls */
        .nav-controls {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            gap: 15px;
            z-index: 1000;
        }

        .nav-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(0, 242, 255, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 242, 255, 0.2);
        }

        .nav-btn i {
            font-size: 32px;
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>

<body>

    <div class="slide-container">
        <div class="grid-bg"></div>
        <div class="bg-orb orb-1"></div>
        <div class="bg-orb orb-2"></div>

        <div class="content-wrapper">
            <img src="assets/profile.jpg" alt="Wissem Kooli" class="profile-pic">
            <h1 class="profile-name">Wissem Kooli</h1>
            <div class="profile-title">First Year Industrial Engineering Student — ENSIT</div>
            <p class="profile-bio">Exploring the intersection of industrial engineering and blockchain technology, with
                a focus on supply chain systems.</p>
        </div>
    </div>


    <div class="nav-controls">
        <button class="nav-btn" id="prevBtn" title="Previous Slide">
            <i class="material-icons">chevron_left</i>
        </button>
        <button class="nav-btn" id="nextBtn" title="Next Slide">
            <i class="material-icons">chevron_right</i>
        </button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const path = window.location.pathname;
            const filename = path.split('/').pop() || '1.html';
            const pageMatch = filename.match(/(\d+)/);
            const currentPage = pageMatch ? parseInt(pageMatch[0]) : 1;
            const totalPages = 11;

            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');

            if (currentPage <= 1) {
                prevBtn.disabled = true;
            } else {
                prevBtn.onclick = () => {
                    const prevPage = currentPage - 1;
                    window.location.href = prevPage + '.html';
                };
            }

            if (currentPage >= totalPages) {
                nextBtn.disabled = true;
            } else {
                nextBtn.onclick = () => {
                    const nextPage = currentPage + 1;
                    window.location.href = nextPage + '.html';
                };
            }

            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight' && currentPage < totalPages) nextBtn.click();
                if (e.key === 'ArrowLeft' && currentPage > 1) prevBtn.click();
            });
        });
    </script>
</body>

</html>
